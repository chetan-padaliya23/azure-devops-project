name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write


jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}     


      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="terraform.tfvars" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="terraform.tfvars" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Deploy Docker on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo apt-get install -y docker.io
            sudo docker ps | grep nginx || sudo docker run -d -p 80:80 nginx